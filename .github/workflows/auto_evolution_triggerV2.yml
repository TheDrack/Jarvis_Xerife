name: 🚀 JARVIS Integrated Evolution
# ⚠️ AUTO-EVOLUÇÃO PAUSADA: Repositório em reorganização estrutural.
# Reativar apenas quando a estrutura estiver estabilizada.

on:
  workflow_dispatch: # Evolução é um ato de vontade manual - PAUSADO
  schedule:
    - cron: "0 */6 * * *"  # Executa a cada 6 horas

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  gate:
    name: "🚦 Gate de Evolução"
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Verificar EVOLUTION_ENABLED
        id: check
        env:
          EVOLUTION_ENABLED: ${{ vars.EVOLUTION_ENABLED }}
        run: |
          if [ "${EVOLUTION_ENABLED}" = "true" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "✅ Auto-evolução habilitada."
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "⏸️  Auto-evolução pausada (EVOLUTION_ENABLED != true)."
          fi

  evolution_cycle:
    name: "🧬 Ciclo de Evolução"
    needs: gate
    if: |
      needs.gate.outputs.enabled == 'true' &&
      github.event_name != 'pull_request' &&
      !contains(github.event.head_commit.message, '[Auto-Evolution] DNA Mutated')
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.flow.outputs.action }}
      pr_number: ${{ steps.create_pr.outputs.pr_number }}
      branch: ${{ steps.create_pr.outputs.branch }}
      mission_desc: ${{ steps.flow.outputs.mission_desc }}
    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # O GIT_PAT é crucial para que a PR aberta dispare a Homeostase automaticamente
          token: ${{ secrets.GIT_PAT }}

      - name: 📦 Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'

      - name: 🧠 Orquestrador e Identificação de Missão
        id: flow
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GIT_PAT }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Setup do ambiente isolado com UV
          uv venv --clear --python 3.11
          source .venv/bin/activate
          uv pip install sqlmodel requests pydantic groq python-dotenv
          
          python - << 'PYCODE'
          import os, sys, re
          from app.application.services.auto_evolutionV2 import AutoEvolutionServiceV2
          
          try:
              auto = AutoEvolutionServiceV2()
              github_output = os.environ.get('GITHUB_OUTPUT')
              
              last_msg = os.popen("git log -1 --pretty=%B").read()
              print(f"--- ANALISANDO DNA ---\nMsg: {last_msg.strip()}")
              
              is_auto_evolution = bool(re.search(r'auto-evolution|mission-\d+', last_msg, re.IGNORECASE))
              is_sync = "Inventory Synchronized" in last_msg
              
              # Sincronização lógica do Roadmap
              if is_auto_evolution and not is_sync:
                  print("🎯 DNA de Evolução detectado. Sincronizando inventário...")
                  match = re.search(r'CAP-\d+', last_msg)
                  if match:
                      cap_id = match.group()
                      if auto.mark_mission_as_completed(cap_id):
                          print(f"✅ Missão {cap_id} integrada com sucesso.")
                  
                  with open(github_output, 'a') as f:
                      f.write("action=idle\n")
                  sys.exit(0)

              print("🟢 Buscando próxima mutação na apostila de aprendizado...")
              next_m = auto.find_next_mission()
              
              if next_m:
                  context = auto.get_roadmap_context(next_m)
                  with open('mission_context.txt', 'w', encoding='utf-8') as mc:
                      mc.write(context)
                  
                  with open(github_output, 'a', encoding='utf-8') as f:
                      f.write(f"action=evolve\n")
                      f.write(f"mission_desc={next_m['id']}: {next_m['title']}\n")
                  print(f"🚀 Alvo identificado: {next_m['id']}")
              else:
                  with open(github_output, 'a') as f:
                      f.write("action=idle\n")
                  print("😴 Sem missões pendentes no momento.")
                  
          except Exception as e:
              print(f"❌ Falha no Orquestrador: {e}")
              sys.exit(1)
          PYCODE

      - name: 🤖 Mutação e Abertura de PR
        id: create_pr
        if: steps.flow.outputs.action == 'evolve'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GIT_PAT }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          git config --global user.name "Jarvis-Bot"
          git config --global user.email "jarvis@bot.com"
          
          source .venv/bin/activate
          
          # Criação de Branch Única
          BRANCH_NAME="auto-evolution/mission-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          
          # Execução do Mutator (Criação do código funcional)
          if ! python scripts/evolution_mutator.py \
            --strategy "minimal_change" \
            --intent "auto-evolution-mission" \
            --impact "functional-improvement" \
            --roadmap-context "$(cat mission_context.txt)"; then
              echo "❌ Falha crítica no motor de mutação."
              exit 1
          fi

          # Persistência e Push via GIT_PAT
          git add -A
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "[Auto-Evolution] DNA Mutated: ${{ steps.flow.outputs.mission_desc }}"
            
            # Blindagem contra erro 403
            git remote set-url origin https://x-access-token:${{ secrets.GIT_PAT }}@github.com/${{ github.repository }}.git
            git push origin "$BRANCH_NAME"
            
            echo "📢 Criando Pull Request..."
            PR_URL=$(gh pr create \
                         --title "🧬 Evolução: ${{ steps.flow.outputs.mission_desc }}" \
                         --body "### 🧠 Evolução JARVIS \n**Missão:** ${{ steps.flow.outputs.mission_desc }} \n\n*Aguardando validação da Homeostase.*" \
                         --base main --head "$BRANCH_NAME")
            
            echo "pr_number=$(echo $PR_URL | awk -F'/' '{print $6}')" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          else
            echo "⚠️ A mutação não gerou novos dados."
            echo "action=idle" >> $GITHUB_OUTPUT
          fi
