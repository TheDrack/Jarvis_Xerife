
name: 🧬 Validação — Auto-Evolução e Multi-LLM

on:
  workflow_dispatch:
    inputs:
      cap_id:
        description: "CAP a evoluir (ex: CAP-001). Deixe vazio para pular evolução."
        required: false
        default: ""
      run_batch:
        description: "Executar evolução em lote?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      batch_limit:
        description: "Limite de caps no lote"
        required: false
        default: "5"
      run_tests:
        description: "Executar pytest?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  diagnostico-llm:
    name: 🔍 Diagnóstico de LLMs
    runs-on: ubuntu-latest
    outputs:
      llms_ok: ${{ steps.check.outputs.llms_ok }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar requests
        run: pip install -q requests

      - name: 🔍 Checar LLMs e testar MetabolismCore
        id: check
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python - <<'PYEOF'
          import os, sys
          sys.path.insert(0, ".")

          provedores = {
              "Groq":        "GROQ_API_KEY",
              "Gemini":      "GEMINI_API_KEY",
              "OpenRouter":  "OPENROUTER_API_KEY",
              "Mistral":     "MISTRAL_API_KEY",
          }
          print("=" * 45)
          disponiveis = 0
          for nome, env in provedores.items():
              key = os.getenv(env, "")
              ok = bool(key and len(key) > 10)
              print(f"{'✅' if ok else '❌'}  {nome} ({env})")
              if ok:
                  disponiveis += 1
          print(f"\nDisponíveis: {disponiveis}/{len(provedores)}")
          print("=" * 45)

          if disponiveis == 0:
              print("⛔ Nenhum secret de LLM configurado.")
              print("   Vá em Settings > Secrets > Actions e adicione ao menos GROQ_API_KEY.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("llms_ok=false\n")
              sys.exit(1)

          try:
              from app.application.services.metabolism_core import MetabolismCore
              result = MetabolismCore().ask_jarvis(
                  'Responda apenas JSON sem markdown.',
                  'Responda: {"status": "ok"}',
                  require_json=True,
              )
              print(f"✅ MetabolismCore OK → {result}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("llms_ok=true\n")
          except Exception as e:
              print(f"❌ MetabolismCore falhou: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("llms_ok=false\n")
              sys.exit(1)
          PYEOF

  validar-stubs:
    name: 🔧 Corrigir stubs + relatório
    runs-on: ubuntu-latest
    needs: diagnostico-llm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🔧 fix_cap_stubs.py
        run: python scripts/fix_cap_stubs.py

      - name: 🔍 Verificar templates não expandidos
        run: |
          python - <<'PYEOF'
          from pathlib import Path
          import sys
          problemas = [
              f.name for f in sorted(Path("app/domain/capabilities").glob("cap_*.py"))
              if "{cap['id']}" in f.read_text(encoding="utf-8")
              or "{target_dir}" in f.read_text(encoding="utf-8")
          ]
          if problemas:
              print(f"❌ {len(problemas)} arquivo(s) com template literal:")
              print("\n".join(f"  - {p}" for p in problemas))
              sys.exit(1)
          total = len(list(Path("app/domain/capabilities").glob("cap_*.py")))
          print(f"✅ Todos os {total} arquivos estão corretos.")
          PYEOF

      - name: 📊 Progresso do roadmap
        run: |
          python - <<'PYEOF'
          import json
          from pathlib import Path
          caps = json.loads(Path("data/capabilities.json").read_text(encoding="utf-8")).get("capabilities", [])
          total    = len(caps)
          complete = sum(1 for c in caps if c.get("status") == "complete")
          print(f"ROADMAP: {complete}/{total} ({complete/total*100:.1f}%) completas")
          proximas = sorted([c for c in caps if c.get("status") != "complete"], key=lambda x: x.get("priority", 99))
          print("\nPróximas 10:")
          for c in proximas[:10]:
              print(f"  [{c.get('priority','?')}] {c['id']} — {c['title'][:55]}")
          PYEOF

  evoluir-cap:
    name: 🧬 Evoluir ${{ github.event.inputs.cap_id }}
    runs-on: ubuntu-latest
    needs: validar-stubs
    if: ${{ github.event.inputs.cap_id != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install -q requests
          pip install -q -r requirements/core.txt || pip install -q requests pydantic

      - name: 🧬 Evoluir cap
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python scripts/evolution_mutator.py \
            --cap-id "${{ github.event.inputs.cap_id }}" \
            --roadmap-context "Gerado via GitHub Actions" \
            --max-attempts 3

      - name: 🔍 Validar código gerado
        run: |
          python - <<'PYEOF'
          import ast, sys
          from pathlib import Path
          num     = "${{ github.event.inputs.cap_id }}".replace("CAP-", "").zfill(3)
          arquivo = Path(f"app/domain/capabilities/cap_{num}.py")
          if not arquivo.exists():
              print(f"❌ {arquivo} não foi criado."); sys.exit(1)
          code = arquivo.read_text(encoding="utf-8")
          print(f"📄 {arquivo} — {len(code.splitlines())} linhas")
          try:
              tree = ast.parse(code)
          except SyntaxError as e:
              print(f"❌ Sintaxe inválida: {e}"); sys.exit(1)
          has_class   = any(isinstance(n, ast.ClassDef) for n in ast.walk(tree))
          has_execute = any(isinstance(n, ast.FunctionDef) and n.name == "execute" for n in ast.walk(tree))
          is_stub     = "return {'status': 'success', 'id': 'CAP-" in code
          if not has_class:   print("❌ Sem classe.");        sys.exit(1)
          if not has_execute: print("❌ Sem execute().");     sys.exit(1)
          if is_stub:         print("❌ Ainda é um stub.");   sys.exit(1)
          print("✅ Código válido com lógica real.")
          for i, l in enumerate(code.splitlines()[:25], 1):
              print(f"{i:3}: {l}")
          PYEOF

      - name: 💾 Commit
        run: |
          git config user.name  "JARVIS Evolution Bot"
          git config user.email "jarvis-bot@noreply.github.com"
          git add app/domain/capabilities/ data/capabilities.json
          git diff --cached --quiet || git commit -m "🧬 evolução: ${{ github.event.inputs.cap_id }}"
          git push

  evoluir-lote:
    name: 🚀 Lote (limite ${{ github.event.inputs.batch_limit }})
    runs-on: ubuntu-latest
    needs: validar-stubs
    if: ${{ github.event.inputs.run_batch == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install -q requests
          pip install -q -r requirements/core.txt || pip install -q requests pydantic

      - name: 🚀 Lote
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python scripts/evolve_all_pending.py \
            --limit "${{ github.event.inputs.batch_limit }}" \
            --delay 3 \
            --max-attempts 2

      - name: 💾 Commit do lote
        run: |
          git config user.name  "JARVIS Evolution Bot"
          git config user.email "jarvis-bot@noreply.github.com"
          git add app/domain/capabilities/ data/capabilities.json
          git diff --cached --quiet || git commit -m "🧬 lote: $(date +'%Y-%m-%d %H:%M') — limite ${{ github.event.inputs.batch_limit }}"
          git push

  testes:
    name: 🧪 Pytest
    runs-on: ubuntu-latest
    needs: validar-stubs
    if: ${{ github.event.inputs.run_tests == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências de dev
        run: |
          pip install -q pytest pytest-asyncio
          pip install -q -r requirements/core.txt || pip install -q requests pydantic

      - name: 🧪 Testes de domínio
        run: pytest tests/domain/ -v --tb=short -q

      - name: 🧪 Testes do Nexus
        run: |
          pytest tests/test_nexus_circuit_breaker.py -v --tb=short -q || true
          pytest tests/test_nexus_registry_sync.py   -v --tb=short -q || true

      - name: 🧪 Testes de segurança
        run: pytest tests/security/ -v --tb=short -q || true

      - name: 🧪 AssistantService + Overwatch
        run: |
          pytest tests/application/test_assistant_service.py -v --tb=short -q || true
          pytest tests/test_overwatch_daemon.py              -v --tb=short -q || true

  relatorio-final:
    name: 📊 Relatório Final
    runs-on: ubuntu-latest
    needs: [diagnostico-llm, validar-stubs, testes]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📊 Resumo final
        run: |
          python - <<'PYEOF'
          import json
          from pathlib import Path
          caps  = json.loads(Path("data/capabilities.json").read_text(encoding="utf-8")).get("capabilities", [])
          total    = len(caps)
          complete = sum(1 for c in caps if c.get("status") == "complete")
          stub_markers = ["return {'status': 'success', 'id': 'CAP-"]
          impl = stubs = 0
          for f in Path("app/domain/capabilities").glob("cap_*.py"):
              code = f.read_text(encoding="utf-8")
              if any(m in code for m in stub_markers): stubs += 1
              elif "def execute" in code and len(code.splitlines()) > 20: impl += 1
          print("=" * 50)
          print("📊 RELATÓRIO FINAL")
          print("=" * 50)
          print(f"  JSON: {complete}/{total} caps completas ({complete/total*100:.1f}%)")
          print(f"  Arquivos com lógica real : {impl}")
          print(f"  Arquivos ainda stub      : {stubs}")
          print(f"  Caps pendentes           : {total - complete}")
          print("=" * 50)
          PYEOF
