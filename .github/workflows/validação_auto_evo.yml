name: 🧬 Validação — Auto-Evolução e Multi-LLM

on:
  workflow_dispatch:
    inputs:
      cap_id:
        description: "CAP a evoluir (ex: CAP-001). Deixe vazio para pular evolução."
        required: false
        default: ""
        type: string
      run_batch:
        description: "Executar evolução em lote?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      batch_limit:
        description: "Limite de caps no lote"
        required: false
        default: "5"
        type: string
      run_tests:
        description: "Executar pytest?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  diagnostico-llm:
    name: 🔍 Diagnóstico de LLMs
    runs-on: ubuntu-latest
    outputs:
      llms_ok: ${{ steps.check.outputs.llms_ok }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -q requests

      - name: 🔍 Checar LLMs e testar MetabolismCore
        id: check
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python - <<'PYEOF'
          import os, sys
          sys.path.insert(0, ".")

          provedores = {
              "Groq":        "GROQ_API_KEY",
              "Gemini":      "GEMINI_API_KEY",
              "OpenRouter":  "OPENROUTER_API_KEY",
              "Mistral":     "MISTRAL_API_KEY",
          }
          print("=" * 45)
          disponiveis = 0
          for nome, env in provedores.items():
              key = os.getenv(env, "")
              ok = bool(key and len(key) > 10)
              print(f"{'✅' if ok else '❌'}  {nome} ({env})")
              if ok:
                  disponiveis += 1
          print(f"\nDisponíveis: {disponiveis}/{len(provedores)}")
          print("=" * 45)

          if disponiveis == 0:
              print("⛔ Nenhum secret de LLM configurado.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("llms_ok=false\n")
              sys.exit(1)

          try:
              from app.core.nexus import nexus
              core = nexus.resolve("metabolism_core")
              result = core.ask_jarvis(
                  'Responda apenas JSON sem markdown.',
                  'Responda: {"status": "ok"}',
                  require_json=True,
              )
              print(f"✅ MetabolismCore OK → {result}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("llms_ok=true\n")
          except Exception as e:
              print(f"❌ MetabolismCore falhou: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("llms_ok=false\n")
              sys.exit(1)
          PYEOF

  validar-stubs:
    name: 🔧 Corrigir stubs + relatório
    runs-on: ubuntu-latest
    needs: diagnostico-llm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🔧 fix_cap_stubs.py
        run: python scripts/fix_cap_stubs.py

      - name: 🔍 Verificar templates não expandidos
        run: |
          python - <<'PYEOF'
          from pathlib import Path
          import sys
          problemas = [
              f.name for f in sorted(Path("app/domain/capabilities").glob("cap_*.py"))
              if "{cap['id']}" in f.read_text(encoding="utf-8")
              or "{target_dir}" in f.read_text(encoding="utf-8")
          ]
          if problemas:
              print(f"❌ {len(problemas)} arquivo(s) com template literal:")
              print("\n".join(f"  - {p}" for p in problemas))
              sys.exit(1)
          print("✅ Arquivos de capability validados.")
          PYEOF

  evoluir-cap:
    name: 🧬 Evoluir cap
    runs-on: ubuntu-latest
    needs: [validar-stubs, diagnostico-llm]
    if: ${{ github.event.inputs.run_batch != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install -q requests
          pip install -q -r requirements/core.txt || pip install -q requests pydantic

      - name: 🎯 Selecionar CAP
        id: select_cap
        run: |
          CAP_ID="${{ github.event.inputs.cap_id }}"
          if [ -z "$CAP_ID" ]; then
            CAP_ID=$(python - <<'PYEOF'
          import json, sys
          from pathlib import Path
          path = Path("data/capabilities.json")
          if not path.exists():
              sys.exit(0)
          caps = json.loads(path.read_text(encoding="utf-8")).get("capabilities", [])
          pending = sorted([c for c in caps if c.get("status") not in ("complete",)], key=lambda x: x.get("priority", 99))
          print(pending[0]["id"] if pending else "", end="")
          PYEOF
            )
            if [ -z "$CAP_ID" ]; then
              echo "✅ Sem caps pendentes."
              echo "cap_id=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "cap_id=$CAP_ID" >> "$GITHUB_OUTPUT"

      - name: 🧬 Evoluir cap
        if: steps.select_cap.outputs.cap_id != ''
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python scripts/evolution_mutator.py \
            --cap-id "${{ steps.select_cap.outputs.cap_id }}" \
            --roadmap-context "Gerado via GitHub Actions" \
            --max-attempts 3

      - name: 💾 Commit
        if: steps.select_cap.outputs.cap_id != ''
        run: |
          git config user.name  "JARVIS Evolution Bot"
          git config user.email "jarvis-bot@noreply.github.com"
          git add app/domain/capabilities/ data/capabilities.json data/capabilities.jrvs
          git diff --cached --quiet || git commit -m "🧬 evolução: ${{ steps.select_cap.outputs.cap_id }}"
          git push

  evoluir-lote:
    name: 🚀 Lote
    runs-on: ubuntu-latest
    needs: [validar-stubs, diagnostico-llm]
    if: ${{ github.event.inputs.run_batch == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: pip install -q requests pydantic
      - name: 🚀 Lote
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python scripts/evolve_all_pending.py \
            --limit "${{ github.event.inputs.batch_limit }}" \
            --delay 3
      - name: 💾 Commit do lote
        run: |
          git config user.name  "JARVIS Evolution Bot"
          git config user.email "jarvis-bot@noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "🧬 evolução em lote"
          git push

  testes:
    name: 🧪 Pytest
    runs-on: ubuntu-latest
    needs: validar-stubs
    if: ${{ github.event.inputs.run_tests == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências de dev
        run: pip install -q pytest pytest-asyncio pytest-cov
      - name: 🧪 Rodar Testes
        run: pytest tests/domain/ -v --tb=short

  relatorio-final:
    name: 📊 Relatório Final
    runs-on: ubuntu-latest
    needs: [diagnostico-llm, validar-stubs, testes]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 📊 Resumo final
        env:
          DIAGNOSTICO_LLM: ${{ needs.diagnostico-llm.result }}
          VALIDAR_STUBS: ${{ needs.validar-stubs.result }}
          TESTES: ${{ needs.testes.result }}
        run: |
          python - <<'PYEOF'
          import json, os, time, sys
          from pathlib import Path
          
          caps_path = Path("data/capabilities.json")
          caps = json.loads(caps_path.read_text(encoding="utf-8")).get("capabilities", []) if caps_path.exists() else []
          total = len(caps)
          complete = sum(1 for c in caps if c.get("status") == "complete")
          
          print("=" * 50)
          print(f"📊 RELATÓRIO: {complete}/{total} completas")
          print(f"Diagnóstico: {os.getenv('DIAGNOSTICO_LLM')}")
          print(f"Testes: {os.getenv('TESTES')}")
          print("=" * 50)
          PYEOF
