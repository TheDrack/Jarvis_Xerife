name: 🔧 Fix Inconsistencies

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simular correções sem aplicar (dry-run)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      validate:
        description: 'Validar registry após correções'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PYTHON_VERSION: '3.12'

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🔧 Executar script de correção
        id: fix
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          VALIDATE: ${{ github.event.inputs.validate }}
        run: |
          python scripts/fix_inconscistences.py \
            $([ "$DRY_RUN" = "true" ] && echo "--dry-run" || echo "--apply") \
            $([ "$VALIDATE" = "true" ] && echo "--validate")

      - name: 📊 Upload do log de correção
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fix-inconsistencies-log-${{ github.run_id }}
          path: |
            *.log
            nexus_di_migration_report.txt
          retention-days: 30

      - name: 📝 Commit das mudanças (se não for dry-run)
        if: github.event.inputs.dry_run == 'false'
        run: |
          git config --local user.email "jarvis-bot@github.com"
          git config --local user.name "JARVIS Fix Bot"
          git add -A
          git diff --staged --quiet || git commit -m "🔧 [JARVIS] Fix inconsistencies between docs and code"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Resumo no Step Summary
        run: |
          echo "## 🔧 Fix Inconsistencies Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Modo | ${{ github.event.inputs.dry_run == 'true' && 'DRY-RUN' || 'APPLY' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validação | ${{ github.event.inputs.validate }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verifique os artefatos para detalhes completos." >> $GITHUB_STEP_SUMMARY