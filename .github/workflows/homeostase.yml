name: "🧬 JARVIS Self Healing V3"

on:
  pull_request:
    branches: [main, master, develop]
  workflow_run:
    workflows: 
      - "Copilot coding agent"
      - "Copilot code review"
      - "Repo Lifecycle Governance"
      - "☁️ Sync JARVIS to Google Drive"
      - "💎 JARVIS: Crystallizer"
      - "🖥️ Build and Release Jarvis Installer"
      - "🚀 JARVIS Integrated Evolution"
    types: [completed]
  workflow_dispatch:
    inputs:
      error_log:
        description: 'Log de erro da produção'
        required: false
        default: ''

jobs:
  homeostasis:
    name: "🧪 Vistoria e Auto-Cura"
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT_PAT }}
          ref: ${{ github.head_ref || github.ref_name || 'main' }}

      - name: 🔍 Verificação de Gatilho
        id: gatekeeper
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]] || \
             ([[ "${{ github.event_name }}" == "workflow_run" ]] && [[ "${{ github.event.workflow_run.conclusion }}" == "failure" ]]) || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "authorized=false" >> $GITHUB_OUTPUT
          fi

      - name: ⚙️ Configurar Identidade JARVIS
        if: steps.gatekeeper.outputs.authorized == 'true'
        run: |
          git config --global user.name "JARVIS"
          git config --global user.email "jarvis@simbiose.ai"

      - name: 📦 Setup UV
        if: steps.gatekeeper.outputs.authorized == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'

      - name: 🔧 Instalação do DNA
        if: steps.gatekeeper.outputs.authorized == 'true'
        run: |
          uv venv --clear --python 3.11
          uv pip install -r requirements/core.txt pytest pytest-json-report pytest-cov anyio autopep8 requests

      - name: 🔍 Modo de Recuperação (Workflow Failure)
        if: steps.gatekeeper.outputs.authorized == 'true' && github.event_name == 'workflow_run'
        id: recover_logic
        run: |
          FAILED_SHA=${{ github.event.workflow_run.head_sha }}
          STABLE_SHA=$(git rev-parse $FAILED_SHA^)
          RECOVERY_BRANCH="jarvis/recovery-${{ github.run_id }}"
          git checkout -b $RECOVERY_BRANCH $STABLE_SHA
          echo "target_branch=$RECOVERY_BRANCH" >> $GITHUB_OUTPUT

      - name: 🔄 Ciclo de Auto-Cura e Testes
        if: steps.gatekeeper.outputs.authorized == 'true'
        id: healing_process
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: "."
        run: |
          PYTEST_IGNORES="--ignore=tests/test_engine.py --ignore=tests/test_system_commands.py"
          uv run pytest $PYTEST_IGNORES --json-report --json-report-file=report.json > pytest_log.txt 2>&1 || true
          
          PRODUCTION_LOG_ARG=""
          if [[ -n "${{ github.event.inputs.error_log }}" ]]; then
            echo "${{ github.event.inputs.error_log }}" > production_error.log
            PRODUCTION_LOG_ARG="--production-log production_error.log"
          fi
          
          uv run python scripts/jarvis_healer.py --report report.json --log pytest_log.txt $PRODUCTION_LOG_ARG
          uv run pytest $PYTEST_IGNORES --json-report --json-report-file=report_final.json > final_log.txt 2>&1 || true
          
          if ! grep -qE "ERRORS?|errors?|failed|IndentationError" final_log.txt; then
             echo "status=success" >> $GITHUB_OUTPUT
          else
             echo "status=partial" >> $GITHUB_OUTPUT
          fi

      - name: 🛠️ Commit & Push (Sincronização de Correção)
        if: steps.gatekeeper.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GIT_PAT }}
          # Fallback para branch atual se as variáveis do GH falharem
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git add .
          
          if ! git diff --staged --quiet; then
            git commit -m "fix(jarvis): auto-cura aplicada via ${{ github.event_name }} [${{ steps.healing_process.outputs.status }}]"
            
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              PUSH_TARGET=${{ github.head_ref }}
              git push origin HEAD:$PUSH_TARGET
              if [[ "${{ steps.healing_process.outputs.status }}" == "success" ]]; then
                gh pr merge ${{ github.event.pull_request.number }} --auto --merge || true
              fi
            elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
              TARGET_BRANCH="${{ steps.recover_logic.outputs.target_branch }}"
              git push origin HEAD:$TARGET_BRANCH
              gh pr create --title "🛡️ JARVIS: Reparo Automático ($TARGET_BRANCH)" \
                --body "Correção aplicada após falha no workflow: ${{ github.event.workflow_run.name }}" \
                --head $TARGET_BRANCH --base main || true
            else
              # Modo Dispatch: Push na branch onde foi disparado
              git push origin HEAD:$CURRENT_BRANCH
            fi
          else
            echo "Nenhuma alteração necessária no DNA."
          fi

      - name: 💤 Standby
        if: steps.gatekeeper.outputs.authorized == 'false'
        run: echo "Sistemas estáveis."
