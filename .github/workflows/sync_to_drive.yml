name: "☁️ Sync JARVIS to Google Drive"

on:
  workflow_dispatch:
  # ADICIONADO: O receptor para o comando do Jarvis
  repository_dispatch:
    types: [jarvis_order]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 🛰️ Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 🔧 Install Dependencies
        run: |
          pip install \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib \
            pyyaml

      - name: ☁️ Run JARVIS Pipeline (Sync Drive & Backups)
        env:
          G_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
          PIPELINE: sync_drive
          PIPELINE_STRICT: "false"
        run: |
          export PYTHONPATH="$(pwd)"
          python app/runtime/pipeline_runner.py
