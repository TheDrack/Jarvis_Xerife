# JARVIS Pipeline: Sincronização e Backup de DNA
components:
  consolidator:
    id: "consolidator"
    hint_path: "adapters/infrastructure"

  consolidated_context_service:
    id: "consolidated_context_service"
    hint_path: "application/services"

  drive_uploader:
    id: "drive_uploader"
    hint_path: "adapters/infrastructure"
    singleton: true
    config:
      strict_mode: false

  telegram_backup:
    id: "telegram_adapter"
    hint_path: "adapters/infrastructure"
    config:
      action: "upload_backup"

  gist_backup:
    id: "gist_uploader"
    hint_path: "adapters/infrastructure"